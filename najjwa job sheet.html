<!-- SET PERCENT SIAP DI SINI -->

<a href="next page.html" class="back-btn">Back</a>

<script>
const sheets = document.querySelectorAll('.sheet-box');
const totalSheets = sheets.length;

// ambil percent siap dari HTML
const progressEl = document.getElementById('progressText');
let completedPercent = parseInt(progressEl.dataset.completedPercent) || 0;

// kira berapa box yang completed ikut percent
let completedBoxes = Math.round((completedPercent / 100) * totalSheets);

let currentCompleted = 0;

function updateProgress() {
  const percent = Math.round((currentCompleted / totalSheets) * 100);
  progressEl.innerText = `Progress: ${percent}% completed`;
}

// Animasi mark completed satu per satu
const interval = setInterval(() => {
  if(currentCompleted >= completedBoxes){
    clearInterval(interval);
  } else {
    sheets[currentCompleted].classList.add('completed');
    currentCompleted++;
    updateProgress();
  }
}, 300);
</script>

</body>
