<!-- JS BERSAMA HTML -->
<script>
// Ambil semua job sheet
const sheets = document.querySelectorAll('.sheet-box');
const totalSheets = sheets.length;

// Tetapkan berapa job sheet siap (ubah ikut keadaan)
const completedSheets = 6;

let currentCompleted = 0;

// Fungsi update percent
function updateProgress() {
  const percent = Math.round((currentCompleted / totalSheets) * 100);
  document.getElementById('progressText').innerText = `Progress: ${percent}% completed`;
}

// Animasi mark siap satu persatu
const interval = setInterval(() => {
  if(currentCompleted >= completedSheets){
    clearInterval(interval);
  } else {
    sheets[currentCompleted].classList.add('completed');
    currentCompleted++;
    updateProgress();
  }
}, 300);
</script>
