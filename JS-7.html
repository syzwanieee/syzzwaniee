<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Share Your Travels</title>
  <link rel="stylesheet" href="JS-7.css">
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
</head>
<body>
  <header>
    <h1>Share Your Travels</h1>
    <div class="menu-icon">&#9776;</div>
  </header>

  <main>
    <div class="gallery-box">
      <!-- Gambar utama -->
      <div class="main-image">
        <img id="displayedImage" src="masjid.jpg" alt="Crystal Mosque">
        <p id="caption" class="caption">Crystal Mosque</p>
      </div>

      <!-- Thumbnail gallery -->
      <div class="thumbnail-container">
        <img src="masjid.jpg" alt="Castle" data-full="masjid.jpg" data-caption="Crystal Mosque">
        <img src="trengganu.webp" alt="Town" data-full="trengganu.webp" data-caption="Terengganu Drawbridge">
        <img src="pantai-bali.webp" alt="Beach" data-full="pantai-bali.webp" data-caption="Beach scene">
        <img src="kk.webp" alt="Mountain" data-full="kk.webp" data-caption="Island landscape">
        <img src="sarawak.jpg" alt="City" data-full="sarawak.jpg" data-caption="Sarawak State Legislative Assembly Building">
      </div>
    </div>
  </main>

  <script>
    const displayedImage = document.getElementById('displayedImage');
    const caption = document.getElementById('caption');
    const thumbnails = document.querySelectorAll('.thumbnail-container img');

    thumbnails.forEach(thumb => {
      thumb.addEventListener('click', () => {
        displayedImage.src = thumb.dataset.full;
        caption.textContent = thumb.dataset.caption;
      });
    });
  </script>
</body>
</html>
