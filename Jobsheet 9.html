<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>Shopping Cart</title>
    <link href="style9.css" rel="stylesheet" />
    <script src="9.js"></script>
    <script src="script9.js" defer></script>
</head>

<body>
<div class="title">
    <h1>Shopping Cart</h1>
</div>

<table class="table-fill">
    <thead>
        <tr>
            <th colspan="2">Product</th>
            <th>Quantity</th>
            <th>Price</th>
            <th>Amount</th>
        </tr>
    </thead>
    <tbody id="cart-body">
        <!-- Rows will be generated by JS -->
    </tbody>
    <tfoot>
        <tr class="totals">
            <td colspan="4">Subtotal</td>
            <td id="subtotal">RM0.00</td>
        </tr>
        <tr class="totals">
            <td colspan="4">Tax</td>
            <td id="tax">RM0.00</td>
        </tr>
        <tr class="totals">
            <td colspan="4">Shipping</td>
            <td id="shipping">RM0.00</td>
        </tr>
        <tr class="totals focus">
            <td colspan="4">Grand Total</td>
            <td id="grand">RM0.00</td>
        </tr>
    </tfoot>
</table>
</body>
</html>
